<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Checkout Page</title>
</head>

<body>
    <h1>Checkout</h1>
    <section>
        <h2>Your Cart</h2>
        <img src="https://cdn.freecodecamp.org/curriculum/labs/cube.jpg" alt="kubus rubik">
    </section>
    <section>
        <h2>Payment Information</h2>
        <form>
            <label>
                <span aria-hidden="true">*</span>
                <input id="card-name" name="card-name" type="text" required>
            </label>
            <label>
                <span aria-hidden="true">*</span>
                <input id="card-number" name="card-number" type="text" aria-describedby="card-number-help" required>
            </label>
            <p id="card-number-help">kartu</p>
        </form>
    </section>
</body>

</html>
