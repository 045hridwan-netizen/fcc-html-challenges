<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Survey Form</title>
  </head>

  <body>
    <h1 id="title">toko sayuran</h1>
    <p id="description">makanlah sayuran agar tubuh tetap sehat</p>
    <form id="survey-form">
      <label id="name-label">name</label>
      <input id="name" type="text" placeholder="name" required>

      <label id="email-label">email</label>
      <input type="email" id="email" placeholder="email anda" required>

      <label id="number-label">number</label>
      <input id="number" type="number" min="3" max="50" placeholder="number" required>

      <select id="dropdown">
        <option value="pilihan1">pilihan 1</option>
        <option value="pilihan2">pilihan 2</option>
      </select>
      <input type="radio" value="1" name="user">
      <input type="radio" value="2" name="user">

      <input type="checkbox" value="5">
      <input type="checkbox" value="6">

      <textarea>sekian terimakasih</textarea>
      <button id="submit">submit</button>
    </form>
  </body>
</html>
